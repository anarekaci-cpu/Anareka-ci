<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — ANAREKA-CI</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<style>
  :root{
    --noir:#0e1a12; --vert:#1a3d2b; --vert-clair:#2d6b4f;
    --or:#c9a84c; --or-clair:#e8c97a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px;
    background:linear-gradient(135deg,var(--noir) 0%,var(--vert) 60%,var(--vert-clair) 100%);
    color:#fff; overflow:hidden;
  }
  .wrap{max-width:480px; position:relative; z-index:1;}
  .logo{
    width:96px; height:96px; border-radius:50%; object-fit:cover;
    border:3px solid var(--or); margin-bottom:24px;
    box-shadow:0 0 0 10px rgba(201,168,76,.08), 0 16px 40px rgba(0,0,0,.5);
  }
  .code{
    font-size:84px; font-weight:800; line-height:1;
    color:var(--or-clair); letter-spacing:2px; margin-bottom:8px;
  }
  h1{font-size:24px; font-weight:700; margin-bottom:12px;}
  p{font-size:15px; line-height:1.7; color:rgba(255,255,255,.78); margin-bottom:28px; font-weight:300;}
  .btn{
    display:inline-block; background:var(--or); color:var(--noir);
    padding:14px 32px; border-radius:8px; text-decoration:none;
    font-weight:700; font-size:13px; letter-spacing:1.2px; text-transform:uppercase;
    box-shadow:0 6px 24px rgba(201,168,76,.4); transition:transform .2s, box-shadow .2s;
  }
  .btn:hover{transform:translateY(-3px); box-shadow:0 10px 30px rgba(201,168,76,.5); background:var(--or-clair);}
  .orb{position:absolute; border-radius:50%; pointer-events:none; filter:blur(2px);}
  .orb1{width:360px;height:360px;background:radial-gradient(circle,rgba(201,168,76,.18),transparent 65%);top:-120px;right:-120px;}
  .orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,.12),transparent 65%);bottom:-100px;left:-100px;}
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="wrap">
    <img src="logo.jpg" alt="ANAREKA-CI" class="logo">
    <div class="code">404</div>
    <h1>Cette page est introuvable</h1>
    <p>Le lien que vous avez suivi n'existe pas ou a été déplacé. Retournons à l'accueil pour découvrir l'ANAREKA-CI.</p>
    <a href="/" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
